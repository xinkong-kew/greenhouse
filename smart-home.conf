# ─── 智能家居控制中心 - Nginx 站点配置（HTTPS） ───
# 域名：shijie-smartline.club
# 使用方式：
#   1. 将本文件复制到 /etc/nginx/sites-available/smart-home.conf
#   2. 上传 SSL 证书到 /etc/nginx/ssl/ 目录
#   3. 修改 root 路径指向实际的 smart_v_frontend/dist 目录
#   4. ln -s /etc/nginx/sites-available/smart-home.conf /etc/nginx/sites-enabled/
#   5. rm -f /etc/nginx/sites-enabled/default
#   6. nginx -t && systemctl reload nginx


# ─── HTTP → HTTPS 重定向 ───
# ─── HTTP 服务 ───
server {
    listen 80;
    server_name shijie-smartline.club www.shijie-smartline.club;

    # ===== 关键：对 ADP-L610 的 API 路径放行 HTTP =====
    location /api/adp610/ {
        proxy_pass http://127.0.0.1:5000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # 可选：禁用缓冲，适合实时数据
        proxy_buffering off;
    }

    # ===== 对开发板轮询命令的 API 放行 HTTP =====
    location /api/device/commands {
        proxy_pass http://127.0.0.1:5000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_buffering off;
    }

    # ===== 其他所有请求强制跳转 HTTPS =====
    location / {
        return 301 https://$server_name$request_uri;
    }
}

# ─── HTTPS 主站点 ───
server {
    listen 443 ssl http2;
    server_name shijie-smartline.club www.shijie-smartline.club;

    # ─── SSL 证书路径（请上传证书后确认路径） ───
    ssl_certificate     /etc/nginx/ssl/shijie-smartline.club.pem;
    ssl_certificate_key /etc/nginx/ssl/shijie-smartline.club.key;

    # ─── SSL 安全优化 ───
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers on;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;

    # ─── 安全头 ───
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # ─── 允许上传的最大请求体大小 ───
    client_max_body_size 20m;

    # ─── 前端静态文件根目录（请根据实际路径修改） ───
    root /dapeng/greenhouse/dist;
    index index.html;

    # ─── SPA 路由回退 ───
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ─── API 反向代理 ───
    location /api/ {
        proxy_pass http://127.0.0.1:5000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ─── WebSocket 代理 ───
    location /ws {
        proxy_pass http://127.0.0.1:5000/ws;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 86400;
    }

    # ─── 健康检查 ───
    location /health {
        proxy_pass http://127.0.0.1:5000/health;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        access_log off;
    }

    # ─── 静态资源缓存（图片、字体等） ───
    location ~* \.(jpg|jpeg|png|gif|ico|svg|woff2?|ttf|eot)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    location ~* \.(css|js)$ {
        expires 7d;
        add_header Cache-Control "public, immutable";
    }

    # Socket.IO 代理（必须放在 location / 之前）
location /socket.io/ {
    proxy_pass http://127.0.0.1:5000/socket.io/;
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_read_timeout 86400;
}
}